name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: Tests (no FEniCSx)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -m "not fenics and not slow" --tb=short -q

  test-fenics:
    name: Tests (FEniCSx)
    runs-on: ubuntu-latest
    container:
      image: dolfinx/dolfinx:v0.8.0
    steps:
      - uses: actions/checkout@v4

      - name: Fix container permissions
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run FEniCSx tests
        run: pytest -m "fenics" --tb=short -q
