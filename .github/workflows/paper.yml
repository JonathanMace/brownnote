name: Build Papers (Manual)

on:
  workflow_dispatch:

jobs:
  build-papers:
    name: "Compile ${{ matrix.paper.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        paper:
          - { name: "Paper 1 - Brown Note",       dir: "paper",                           artifact: "paper-1-browntone" }
          - { name: "Paper 2 - Gas Pockets",       dir: "paper2-gas-pockets",              artifact: "paper-2-gas-pockets" }
          - { name: "Paper 3 - Scaling Laws",      dir: "paper3-scaling-laws",              artifact: "paper-3-scaling-laws" }
          - { name: "Paper 4 - Bladder Resonance", dir: "projects/bladder-resonance/paper", artifact: "paper-4-bladder" }
          - { name: "Paper 5 - Borborygmi",        dir: "projects/borborygmi/paper",        artifact: "paper-5-borborygmi" }
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: ${{ matrix.paper.dir }}

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.paper.artifact }}
          path: ${{ matrix.paper.dir }}/main.pdf
          retention-days: 30