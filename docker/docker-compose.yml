# Browntone development services
# Usage: docker compose -f docker/docker-compose.yml up -d

services:
  browntone:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: browntone:latest
    container_name: browntone-dev
    volumes:
      - ..:/work
    working_dir: /work
    environment:
      - DISPLAY=${DISPLAY:-}
      - MPLBACKEND=Agg
    stdin_open: true
    tty: true
    command: bash

  # Jupyter Lab for notebook development
  jupyter:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: browntone:latest
    container_name: browntone-jupyter
    volumes:
      - ..:/work
    working_dir: /work
    ports:
      - "8888:8888"
    environment:
      - MPLBACKEND=Agg
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
